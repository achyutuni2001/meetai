<svg width="240" height="200" viewBox="0 0 240 200" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- White body gradient -->
    <linearGradient id="bodyGrad" x1="32" y1="62" x2="168" y2="158" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E5E7EB"/>
    </linearGradient>

    <!-- Screen gradient -->
    <linearGradient id="screenGrad" x1="58" y1="88" x2="142" y2="132" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>

    <!-- Soft shadow -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Camera Body -->
  <rect x="32" y="62" width="136" height="96" rx="18"
        fill="url(#bodyGrad)"
        filter="url(#softShadow)"/>

  <!-- Subtle inner bevel -->
  <rect x="34" y="64" width="132" height="92" rx="16"
        stroke="#D1D5DB"
        stroke-width="2"
        opacity="0.7"/>

  <!-- Screen -->
  <rect x="58" y="88" width="84" height="44" rx="8"
        fill="url(#screenGrad)"/>

  <!-- Screen glass highlight -->
  <rect x="58" y="88" width="84" height="20" rx="8"
        fill="white"
        opacity="0.15"/>

  <!-- Recording Dot -->
  <circle cx="150" cy="76" r="6" fill="#FF4D4D"/>

  <!-- Camera Extension -->
  <path d="M168 88 L208 74 V126 L168 112 Z"
        fill="url(#bodyGrad)"
        filter="url(#softShadow)"/>

  <!-- Extension edge highlight -->
  <path d="M170 90 L206 77"
        stroke="white"
        stroke-width="2"
        opacity="0.4"/>

</svg>